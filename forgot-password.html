<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ลืมรหัสผ่าน — เยาวชวน สงขลา</title>
  <meta name="theme-color" content="#4CAF88" />

  <!-- Google Fonts: Prompt + Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --primary:        #4CAF88;
      --primary-dark:   #3d9e79;
      --primary-deeper: #2E7D5A;
      --primary-light:  #DDF7EA;
      --primary-pale:   #f0fdf6;
      --accent:         #2E7D5A;
      --bg:             #FFFFFF;
      --border:         #E8F5EC;
      --text-dark:      #2D2D2D;
      --text-mid:       #555E57;
      --text-muted:     #8fa394;
      --radius-card:    24px;
      --radius-input:   14px;
      --radius-btn:     16px;
      --transition:     250ms cubic-bezier(0.4, 0, 0.2, 1);
      --font-main:      'Prompt', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-main);
      background: var(--bg);
      color: var(--text-dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    .bg-layer {
      position: fixed; inset: 0; z-index: 0;
      background: linear-gradient(160deg, #ffffff 0%, #edfaf3 45%, #d0f2e3 100%);
    }

    .page-wrapper {
      position: relative; z-index: 1;
      width: 100%; max-width: 420px;
      padding: 24px 20px;
    }

    .header { display: flex; flex-direction: column; align-items: center; margin-bottom: 24px; }
    .logo-icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #4CAF88 0%, #2E7D5A 100%);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 12px; cursor: pointer;
    }
    .logo-icon svg { width: 32px; height: 32px; fill: white; }
    .site-name { font-size: 24px; font-weight: 700; color: var(--accent); cursor: pointer; }

    .card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(24px);
      border-radius: var(--radius-card);
      border: 1px solid rgba(232, 245, 236, 0.9);
      box-shadow: 0 8px 32px rgba(76,175,136,0.12);
      padding: 28px 24px;
    }
    .card-title { font-size: 19px; font-weight: 700; color: var(--text-dark); text-align: center; margin-bottom: 4px; }
    .card-desc { font-size: 13px; color: var(--text-muted); text-align: center; margin-bottom: 20px; }

    .form { display: flex; flex-direction: column; gap: 16px; }
    .field-group { position: relative; }
    .field-label {
      position: absolute; left: 40px; top: 50%; transform: translateY(-50%);
      font-size: 14px; color: var(--text-muted); pointer-events: none; transition: all var(--transition);
    }
    .field-group.has-value .field-label,
    .field-group.focused .field-label {
      top: 0; left: 32px; font-size: 11px; font-weight: 600; color: var(--primary);
      background: white; padding: 0 4px;
    }
    input {
      width: 100%; height: 50px; padding: 14px 16px 0 40px;
      font-family: var(--font-main); font-size: 14px;
      background: var(--primary-pale); border: 1.5px solid var(--border); border-radius: var(--radius-input);
      outline: none; transition: all var(--transition);
    }
    input:focus { border-color: var(--primary); background: white; }

    .field-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; color: var(--text-muted); }

    .btn-primary {
      width: 100%; height: 50px;
      background: linear-gradient(135deg, #4CAF88 0%, #2E7D5A 100%);
      color: #fff; font-family: var(--font-main); font-size: 15px; font-weight: 600;
      border: none; border-radius: var(--radius-btn); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all var(--transition);
    }
    .btn-primary:hover { transform: scale(1.02); box-shadow: 0 8px 24px rgba(76,175,136,0.3); }

    .btn-secondary {
      width: 100%; height: 50px; background: transparent; color: var(--primary);
      font-family: var(--font-main); font-size: 14.5px; font-weight: 600;
      border: 1.8px solid var(--primary); border-radius: var(--radius-btn); cursor: pointer;
      display: flex; align-items: center; justify-content: center; text-decoration: none;
      transition: all var(--transition);
    }
    .btn-secondary:hover { background: var(--primary-light); transform: scale(1.02); }
  </style>
</head>
<body>
  <div class="bg-layer"></div>

  <main class="page-wrapper">
    <header class="header">
      <div class="logo-icon" onclick="window.location.href='index.html'">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M24 6C24 6 8 14 8 28C8 36.837 15.163 44 24 44C32.8 44 40 36.8 40 28C40 14 24 6 24 6Z" fill="rgba(255,255,255,0.25)" stroke="white" stroke-width="1.5"/>
          <path d="M24 44C24 44 24 22 10 18" stroke="white" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <h1 class="site-name" onclick="window.location.href='index.html'">เยาวชวน สงขลา</h1>
    </header>

    <section class="card">
      <h2 class="card-title">กู้คืนรหัสผ่าน</h2>
      <p class="card-desc">กรอกอีเมลของคุณเพื่อรับลิงก์กู้คืนรหัสผ่าน</p>

      <form class="form" onsubmit="event.preventDefault(); alert('ลิงก์กู้คืนรหัสผ่านจำลองส่งไปยังอีเมลของคุณแล้ว!'); window.location.href='login.html'">
        <div class="field-group" id="emailGroup">
          <div class="input-wrap">
            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            <input type="email" id="emailInput" placeholder=" " required />
            <label class="field-label" for="emailInput">อีเมลที่สมัครสมาชิก</label>
          </div>
        </div>

        <button type="submit" class="btn-primary">ส่งอีเมลตั้งรหัสผ่านใหม่</button>
      </form>

      <div style="margin: 16px 0; text-align: center;">
        <a href="login.html" class="btn-secondary">กลับหน้าเข้าสู่ระบบ</a>
      </div>
    </section>
  </main>

  <script>
    const emailInput = document.getElementById('emailInput');
    const emailGroup = document.getElementById('emailGroup');

    emailInput.addEventListener('focus', () => { emailGroup.classList.add('focused', 'has-value'); });
    emailInput.addEventListener('blur', () => {
      emailGroup.classList.remove('focused');
      if (emailInput.value.length === 0) emailGroup.classList.remove('has-value');
    });
    emailInput.addEventListener('input', () => {
      emailGroup.classList.toggle('has-value', emailInput.value.length > 0);
    });
  </script>
</body>
</html>
